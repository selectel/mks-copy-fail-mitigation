apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cve-2026-31431-mitigation
  namespace: kube-system
  labels:
    app: cve-2026-31431-mitigation
    security: vulnerability-mitigation
spec:
  selector:
    matchLabels:
      app: cve-2026-31431-mitigation
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: cve-2026-31431-mitigation
    spec:
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      hostPID: true
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
        effect: NoExecute
      - operator: Exists
        effect: NoSchedule
      initContainers:
      - name: mitigation
        image: busybox:1.36.1
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          
          echo "-----------------------------------------"
          echo "CVE-2026-31431 Mitigation"
          echo "Hostname: $(cat /host_root/etc/hostname 2>/dev/null)"
          echo "Date: $(date)"
          echo "-----------------------------------------"
          
          echo ""
          echo "Checking vulnerability"
          if nsenter -t 1 -m -u -i -n -p -- python3 -c 'import socket; s = socket.socket(socket.AF_ALG, socket.SOCK_SEQPACKET, 0); s.bind(("aead","authencesn(hmac(sha256),cbc(aes))"))' 2>/dev/null; then
            echo "AF_ALG AEAD interface is accessible"
          else
            echo "AF_ALG AEAD interface is not accessible"
            echo "Vulnerability not confirmed, exiting script"
            exit 0
          fi 
          echo ""
          
          echo ""
          echo "Creating modprobe configuration"
          # Create modprobe.d directory
          mkdir -p /host_root/etc/modprobe.d
          # Disable algif_aead module
          echo "install algif_aead /bin/false" > /host_root/etc/modprobe.d/disable-algif.conf
          echo "Created /etc/modprobe.d/disable-algif.conf"          
          echo ""

          echo ""
          echo "Unloading algif_aead module if loaded..."
          chroot /host_root rmmod algif_aead 2>/dev/null && echo "Module unloaded successfully" || echo "Module was not loaded or already unloaded"      
          echo ""

          echo ""
          echo "Check configuration file exist"
          if [ -f /host_root/etc/modprobe.d/disable-algif.conf ]; then
            echo "Configuration file exists"
          else
            echo "ERROR: Configuration file not found"
            exit 1
          fi
          echo ""

          echo ""
          echo "Verifying if the vulnerability is resolved"
          if nsenter -t 1 -m -u -i -n -p -- python3 -c 'import socket; s = socket.socket(socket.AF_ALG, socket.SOCK_SEQPACKET, 0); s.bind(("aead","authencesn(hmac(sha256),cbc(aes))"))' 2>/dev/null; then
            echo "ERROR: AF_ALG AEAD interface is still accessible"
            exit 1
          else
            echo "AF_ALG AEAD interface is properly blocked"
          fi
          echo ""
          
          echo ""
          echo "---------------------------------------"
          echo "CVE-2026-31431 mitigation applied successfully"
          echo "---------------------------------------"
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - name: host-root
          mountPath: /host_root
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      containers:
        - image: "registry.k8s.io/pause:3.10.1"
          name: pause     